<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var th = localStorage.getItem('dl-theme')
          document.documentElement.classList.toggle('dark', th !== 'light')
          var loc = localStorage.getItem('dl-locale')
          document.documentElement.lang = loc === 'ru' ? 'ru' : 'en'
        } catch (e) {}
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Library Resource Guide</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
